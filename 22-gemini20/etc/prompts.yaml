# etc/prompts.yaml
prompts:
  - name: Video Prompt
    class: video_prompt
    text: A cat playing the piano in a jazz club, cinematic lighting. Camera widens to reveal a fox playing trombone
  - name: Image Prompt 1
    class: image_prompt
    text: A futuristic city at night, neon lights, flying cars
  - name: Image2
    class: image_prompt
    text: A CD album cover by Dream Theater with a Phoenix rising.
  - name: Code Prompt
    class: code
    text: Write a Python function to calculate the factorial of a number.
  - name: Chat Prompt
    class: chat
    text: Tell me a joke about a programmer.
  - name: URL Prompt
    class: url
    text: https://www.google.com
  - name: Summary Prompt
    class: summary
    text: |
      Summarize the main points of the following text: Lorem ipsum dolor sit amet, consectetur adipiscing elit.
      Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
